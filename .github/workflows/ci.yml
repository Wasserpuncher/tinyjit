name: tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    # GitHub's ubuntu runners are x86-64, which is what tinyjit emits code for,
    # so the JIT path (not just the interpreter) is exercised in CI.
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Report architecture
        run: python -c "import platform; print(platform.machine())"

      - name: Run the test suite
        run: python -m unittest discover -s tests -v

      - name: Smoke-test the CLI end to end
        run: |
          test "$(python -m tinyjit run examples/fib.tj -e fib 30)" = "832040"
          test "$(python -m tinyjit run examples/mathlib.tj -e gcd 1071 462)" = "21"
